<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta http-equiv="X-UA-Compatible" content="ie=edge">
   <title>chatlog</title>
   <link rel="stylesheet" href="css/master-styles.css">
   <link rel="stylesheet" href="css/chat-style.css">
   
</head>

<body>
    <main>
        <div class="container">
            <div id="chat-log">
                
                <div class="individual-chat">
                    <p class="chat-name">
                        <span class="chat-user">[<span>bob</span>]</span>
                        <i class="chat-time">2026-08-18-09:20:22</i>
                    </p>
                    
                    <p class="chat-message">hello alice fine thx</p>
                </div>

                <div class="individual-chat">
                    <p class="chat-name">
                        <span class="chat-user">[<span>alice</span>]</span>
                        <i class="chat-time">2026-07-21-16:35:48</i>
                    </p>
                    
                    <p class="chat-message">hello bob hru?</p>
                </div>
                
                <p id="end-message">&ltend of messages&gt</p>
            </div>
            <span id="hr">▪▫▪▫▪▫▪▫▪▫▪▫▪</span>
            <form id="user-input">
                <textarea
                    id="message"
                    required
                    placeholder="your message here..."
                    maxlength="512"
                    autocapitalize="off"
                    autocorrect="off"
                    autocomplete="off"
                ></textarea>

                <div id="username-area">
                    <span>username:</span>

                    <textarea
                        id="username"
                        rows="1"
                        wrap="off"
                        maxlength="20"
                        autocomplete="off"
                        autocapitalize="off"
                        autocorrect="off"
                    ></textarea>
                </div>

                <p id="username-note">
                    (optional - leave blank to be assigned an anonymized name)
                </p>

                <div id="submit-area">
                    <div id="whatam">
                        <a href="about-1.html" rel="next">
                            [<span style="font-style: italic;">what am I?</span>]
                        </a>
                    </div>

                    <input type="submit" id="submit" value="submit">
                </div>
            </form>
        </div>
    </main>
    <script src="js/newline-prevent-script.js"></script>
</body>
